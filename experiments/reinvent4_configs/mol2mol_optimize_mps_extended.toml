# REINVENT4: Extended Mol2Mol Optimization on MPS
# 150 steps Stage 1 + 100 steps Stage 2 = 250 total (~1h at ~15 sec/step)
# Goal: push Mol2Mol analogs to maximum potency

run_type = "staged_learning"
device = "mps"
tb_logdir = "tb_mol2mol_ext"
json_out_config = "_mol2mol_ext.json"

[parameters]
summary_csv_prefix = "mol2mol_ext"
use_checkpoint = false
purge_memories = false

prior_file = "__PRIOR_PATH_MOL2MOL__"
agent_file = "__PRIOR_PATH_MOL2MOL__"
smiles_file = "__PROJECT_ROOT__/data/zap70_top_actives_clean.smi"
sample_strategy = "multinomial"
distance_threshold = 100

batch_size = 64
unique_sequences = true
randomize_smiles = true

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[diversity_filter]
type = "IdenticalMurckoScaffold"
bucket_size = 25
minscore = 0.4
minsimilarity = 0.4

### Stage 1: Generate close analogs (150 steps)
[[stage]]
chkpt_file = "mol2mol_ext_stage1.chkpt"
termination = "simple"
max_score = 0.7
min_steps = 50
max_steps = 150

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]
[[stage.scoring.component.ExternalProcess.endpoint]]
name = "FiLMDelta pIC50"
weight = 0.5
params.executable = "__CONDA_PATH__"
params.args = "run --no-capture-output -n quris python __PROJECT_ROOT__/experiments/reinvent4_film_scorer.py"
params.property = "pIC50"
transform.type = "sigmoid"
transform.high = 7.5
transform.low = 5.5
transform.k = 0.5

[[stage.scoring.component]]
[stage.scoring.component.TanimotoDistance]
[[stage.scoring.component.TanimotoDistance.endpoint]]
name = "Tanimoto to ZAP70 actives"
weight = 0.2
params.smiles = __ZAP70_REF_SMILES__
params.radius = 3
params.use_counts = true
params.use_features = true

[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 0.15

[[stage.scoring.component]]
[stage.scoring.component.custom_alerts]
[[stage.scoring.component.custom_alerts.endpoint]]
name = "Unwanted SMARTS"
weight = 0.15
params.smarts = [
    "[*;r{8-17}]",
    "[#8][#8]",
    "[#6;+]",
    "[#16][#16]",
    "[#7;!n][S;!$(S(=O)=O)]",
    "[#7;!n][#7;!n]",
    "C#C",
    "C(=[O,S])[O,S]",
]

### Stage 2: Push potency, relax similarity (100 steps)
[[stage]]
chkpt_file = "mol2mol_ext_stage2.chkpt"
termination = "simple"
max_score = 0.75
min_steps = 30
max_steps = 100

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]
[[stage.scoring.component.ExternalProcess.endpoint]]
name = "FiLMDelta pIC50"
weight = 0.65
params.executable = "__CONDA_PATH__"
params.args = "run --no-capture-output -n quris python __PROJECT_ROOT__/experiments/reinvent4_film_scorer.py"
params.property = "pIC50"
transform.type = "sigmoid"
transform.high = 8.0
transform.low = 6.0
transform.k = 0.5

[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 0.2

[[stage.scoring.component]]
[stage.scoring.component.custom_alerts]
[[stage.scoring.component.custom_alerts.endpoint]]
name = "Unwanted SMARTS"
weight = 0.15
params.smarts = [
    "[*;r{8-17}]",
    "[#8][#8]",
    "[#6;+]",
    "[#16][#16]",
    "[#7;!n][S;!$(S(=O)=O)]",
    "[#7;!n][#7;!n]",
    "C#C",
    "C(=[O,S])[O,S]",
]
