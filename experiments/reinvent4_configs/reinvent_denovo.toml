# REINVENT4: De Novo Generation with FiLMDelta Scoring for ZAP70
# Generator: Reinvent (RNN) — generates molecules from scratch
# Scoring: FiLMDelta anchor-based pIC50 prediction + QED + Custom Alerts
# Strategy: Staged learning (RL) — reward high predicted pIC50 + drug-likeness

run_type = "staged_learning"
device = "cpu"
tb_logdir = "tb_reinvent_denovo"
json_out_config = "_reinvent_denovo.json"

[parameters]
summary_csv_prefix = "reinvent_denovo"
use_checkpoint = false
purge_memories = false

prior_file = "priors/reinvent.prior"
agent_file = "priors/reinvent.prior"

batch_size = 128
unique_sequences = true
randomize_smiles = true

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[diversity_filter]
type = "IdenticalMurckoScaffold"
bucket_size = 25
minscore = 0.4
minsimilarity = 0.4

### Stage 1: Explore drug-like space with moderate pIC50 threshold
[[stage]]
chkpt_file = "reinvent_denovo_stage1.chkpt"
termination = "simple"
max_score = 0.65
min_steps = 50
max_steps = 300

[stage.scoring]
type = "geometric_mean"

# FiLMDelta pIC50 score (anchor-based)
[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]
[[stage.scoring.component.ExternalProcess.endpoint]]
name = "FiLMDelta pIC50"
weight = 0.6
params.executable = "__CONDA_PATH__"
params.args = "run --no-capture-output -n quris python __PROJECT_ROOT__/experiments/reinvent4_film_scorer.py"
params.property = "pIC50"
transform.type = "sigmoid"
transform.high = 7.0
transform.low = 5.0
transform.k = 0.5

# QED drug-likeness
[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 0.25

# Custom alerts (filter unwanted groups)
[[stage.scoring.component]]
[stage.scoring.component.custom_alerts]
[[stage.scoring.component.custom_alerts.endpoint]]
name = "Unwanted SMARTS"
weight = 0.15
params.smarts = [
    "[*;r{8-17}]",
    "[#8][#8]",
    "[#6;+]",
    "[#16][#16]",
    "[#7;!n][S;!$(S(=O)=O)]",
    "[#7;!n][#7;!n]",
    "C#C",
    "C(=[O,S])[O,S]",
]


### Stage 2: Push toward higher potency
[[stage]]
chkpt_file = "reinvent_denovo_stage2.chkpt"
termination = "simple"
max_score = 0.75
min_steps = 25
max_steps = 200

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]
[[stage.scoring.component.ExternalProcess.endpoint]]
name = "FiLMDelta pIC50"
weight = 0.7
params.executable = "__CONDA_PATH__"
params.args = "run --no-capture-output -n quris python __PROJECT_ROOT__/experiments/reinvent4_film_scorer.py"
params.property = "pIC50"
transform.type = "sigmoid"
transform.high = 8.0
transform.low = 6.0
transform.k = 0.5

[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 0.15

[[stage.scoring.component]]
[stage.scoring.component.custom_alerts]
[[stage.scoring.component.custom_alerts.endpoint]]
name = "Unwanted SMARTS"
weight = 0.15
params.smarts = [
    "[*;r{8-17}]",
    "[#8][#8]",
    "[#6;+]",
    "[#16][#16]",
    "[#7;!n][S;!$(S(=O)=O)]",
    "[#7;!n][#7;!n]",
    "C#C",
    "C(=[O,S])[O,S]",
]
