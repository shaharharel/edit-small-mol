# REINVENT4: Mol2Mol Optimization with FiLMDelta Scoring for ZAP70 (MPS overnight)
# Generator: Mol2Mol (Transformer) — generates analogs of known ZAP70 actives
# Prior: mol2mol_medium_similarity.prior — medium-similarity analog generation
# Scoring: FiLMDelta anchor-based pIC50 + similarity to known actives + QED
# Device: MPS (Apple Silicon) — longer runs for overnight execution

run_type = "staged_learning"
device = "mps"
tb_logdir = "tb_mol2mol_optimize_mps"
json_out_config = "_mol2mol_optimize_mps.json"

[parameters]
summary_csv_prefix = "mol2mol_optimize_mps"
use_checkpoint = false
purge_memories = false

prior_file = "/Users/shaharharel/Documents/github/REINVENT4/priors/mol2mol_medium_similarity.prior"
agent_file = "/Users/shaharharel/Documents/github/REINVENT4/priors/mol2mol_medium_similarity.prior"
smiles_file = "__PROJECT_ROOT__/data/zap70_top_actives_clean.smi"
sample_strategy = "multinomial"
distance_threshold = 100

batch_size = 64
unique_sequences = true
randomize_smiles = true

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[diversity_filter]
type = "IdenticalMurckoScaffold"
bucket_size = 25
minscore = 0.4
minsimilarity = 0.4

### Stage 1: Generate close analogs with improved potency (extended for MPS)
[[stage]]
chkpt_file = "mol2mol_optimize_mps_stage1.chkpt"
termination = "simple"
max_score = 0.7
min_steps = 20
max_steps = 50

[stage.scoring]
type = "geometric_mean"

# FiLMDelta pIC50 score
[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]
[[stage.scoring.component.ExternalProcess.endpoint]]
name = "FiLMDelta pIC50"
weight = 0.5
params.executable = "__CONDA_PATH__"
params.args = "run --no-capture-output -n quris python __PROJECT_ROOT__/experiments/reinvent4_film_scorer.py"
params.property = "pIC50"
transform.type = "sigmoid"
transform.high = 7.5
transform.low = 5.5
transform.k = 0.5

# Similarity to known ZAP70 actives (keep analogs close)
[[stage.scoring.component]]
[stage.scoring.component.TanimotoDistance]
[[stage.scoring.component.TanimotoDistance.endpoint]]
name = "Tanimoto to ZAP70 actives"
weight = 0.2
params.smiles = __ZAP70_REF_SMILES__
params.radius = 3
params.use_counts = true
params.use_features = true

# QED drug-likeness
[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 0.15

# Custom alerts
[[stage.scoring.component]]
[stage.scoring.component.custom_alerts]
[[stage.scoring.component.custom_alerts.endpoint]]
name = "Unwanted SMARTS"
weight = 0.15
params.smarts = [
    "[*;r{8-17}]",
    "[#8][#8]",
    "[#6;+]",
    "[#16][#16]",
    "[#7;!n][S;!$(S(=O)=O)]",
    "[#7;!n][#7;!n]",
    "C#C",
    "C(=[O,S])[O,S]",
]


### Stage 2: Push potency higher, relax similarity (extended for MPS)
[[stage]]
chkpt_file = "mol2mol_optimize_mps_stage2.chkpt"
termination = "simple"
max_score = 0.75
min_steps = 15
max_steps = 30

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]
[[stage.scoring.component.ExternalProcess.endpoint]]
name = "FiLMDelta pIC50"
weight = 0.65
params.executable = "__CONDA_PATH__"
params.args = "run --no-capture-output -n quris python __PROJECT_ROOT__/experiments/reinvent4_film_scorer.py"
params.property = "pIC50"
transform.type = "sigmoid"
transform.high = 8.0
transform.low = 6.0
transform.k = 0.5

[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 0.2

[[stage.scoring.component]]
[stage.scoring.component.custom_alerts]
[[stage.scoring.component.custom_alerts.endpoint]]
name = "Unwanted SMARTS"
weight = 0.15
params.smarts = [
    "[*;r{8-17}]",
    "[#8][#8]",
    "[#6;+]",
    "[#16][#16]",
    "[#7;!n][S;!$(S(=O)=O)]",
    "[#7;!n][#7;!n]",
    "C#C",
    "C(=[O,S])[O,S]",
]
