# Quick test: Reinvent de novo with FiLMDelta (5 steps only)
run_type = "staged_learning"
device = "cpu"
tb_logdir = "tb_test"
json_out_config = "_test.json"

[parameters]
summary_csv_prefix = "test_denovo"
use_checkpoint = false
purge_memories = false

prior_file = "__PRIOR_PATH__"
agent_file = "__PRIOR_PATH__"

batch_size = 16
unique_sequences = true
randomize_smiles = true

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[[stage]]
chkpt_file = "test.chkpt"
termination = "simple"
max_score = 0.99
min_steps = 3
max_steps = 5

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.ExternalProcess]
[[stage.scoring.component.ExternalProcess.endpoint]]
name = "FiLMDelta pIC50"
weight = 0.7
params.executable = "__CONDA_PATH__"
params.args = "run --no-capture-output -n quris python __SCORER_PATH__"
params.property = "pIC50"
transform.type = "sigmoid"
transform.high = 7.0
transform.low = 5.0
transform.k = 0.5

[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 0.3
